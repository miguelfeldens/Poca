services:
  db:
    image: pgvector/pgvector:pg16
    container_name: poca_db
    environment:
      POSTGRES_DB: poca
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - poca_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poca"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  poca_pgdata:
